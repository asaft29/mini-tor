name: Build and Push Docker Images

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  DISCOVERY_IMAGE: ghcr.io/asaft29/tor-discovery
  RELAY_IMAGE: ghcr.io/asaft29/tor-relay

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push discovery
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/discovery/Dockerfile
          push: true
          tags: ${{ env.DISCOVERY_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push relay-node
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/relay-node/Dockerfile
          push: true
          tags: ${{ env.RELAY_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
