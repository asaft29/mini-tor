name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RUST_VERSION: "1.92.0"

jobs:
  check:
    name: Check Compilation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Check workspace compilation
        run: cargo check --workspace --all-targets --all-features

  test:
    name: Test Suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Run workspace tests
        run: cargo test --workspace --all-features --verbose

      - name: Run documentation tests
        run: cargo test --workspace --doc

  clippy:
    name: Clippy (Strict Project Rules)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: clippy

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Run clippy with project rules
        run: |
          cargo clippy --workspace --all-targets --all-features -- \
            -D warnings \
            -D clippy::unwrap_used \
            -D clippy::expect_used \
            -D clippy::panic \
            -D clippy::indexing_slicing \
            -D clippy::unnecessary_wraps \
            -W clippy::missing_errors_doc

      - name: Verify no forbidden patterns in source code
        run: |
          echo "🔍 Checking for forbidden patterns..."
          ! git grep -n "\.unwrap()" -- "*.rs" ":(exclude)target/" ":(exclude)*/tests/*" || (echo "❌ Found .unwrap() in source code" && exit 1)
          ! git grep -n "\.expect(" -- "*.rs" ":(exclude)target/" ":(exclude)*/tests/*" || (echo "❌ Found .expect() in source code" && exit 1)
          ! git grep -n "panic!" -- "*.rs" ":(exclude)target/" ":(exclude)*/tests/*" || (echo "❌ Found panic! in source code" && exit 1)
          echo "✅ No forbidden patterns found"

  fmt:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: rustfmt

      - name: Check code formatting
        run: cargo fmt --all -- --check

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run security audit
        run: cargo audit

  build:
    name: Build Release
    runs-on: ubuntu-latest
    needs: [check, test, clippy, fmt]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build workspace in release mode
        run: cargo build --workspace --release --verbose

      - name: List built binaries
        run: |
          echo "📦 Built binaries:"
          ls -lh target/release/discovery target/release/relay-node 2>/dev/null || echo "Note: tor-client not yet implemented"

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-binaries
          path: |
            target/release/discovery
            target/release/relay-node
          retention-days: 7
          if-no-files-found: warn

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build documentation
        run: cargo doc --workspace --no-deps --all-features
        env:
          RUSTDOCFLAGS: -D warnings

      - name: Upload documentation
        uses: actions/upload-artifact@v4
        with:
          name: documentation
          path: target/doc/
          retention-days: 7
