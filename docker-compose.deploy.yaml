    environment:
      - RUST_LOG=info
    depends_on:
      discovery:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - tor-network

  relay-entry-3:
    build:
      context: .
      dockerfile: services/relay-node/Dockerfile
    container_name: tor-relay-entry-3
