      - "9101"
      - "--host"
      - "${PUBLIC_IP}"
      - "--directory-url"
      - "http://discovery:8080"
      - "--heartbeat-interval"
      - "60"
    environment:
      - RUST_LOG=info
    depends_on:
      discovery:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - tor-network

  relay-middle-2:
